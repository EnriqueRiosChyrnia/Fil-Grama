spring:
  application:
    name: filgrama-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/filgrama}
    username: ${DB_USER:filgrama}
    password: ${DB_PASSWORD:filgrama}

  jpa:
    hibernate:
      ddl-auto: validate      # el esquema lo maneja Flyway, no Hibernate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

# Cifrado de tokens OAuth en reposo (Track C / TokenCipher).
# Default DEV estable; en PROD setear SECURITY_TOKEN_ENCRYPTION_KEY (openssl rand -base64 32).
security:
  token-encryption-key: ${SECURITY_TOKEN_ENCRYPTION_KEY:jCBVFCXsE7fpBhaXEW30ah5xcR5dy1YyNovheoobJus=}
  # Firma HS256 del JWT (Track Auth / JwtProperties prefix=security.jwt).
  # Default DEV inseguro; en PROD setear SECURITY_JWT_SECRET (>=32 bytes). En perfil 'prod' el
  # boot ABORTA si sigue siendo este default (ver ProdSecretsValidator).
  jwt:
    secret: ${SECURITY_JWT_SECRET:dev-only-insecure-jwt-secret-change-me-please-min-32-bytes-0123456789}
    access-ttl: ${SECURITY_JWT_ACCESS_TTL:15m}
    refresh-ttl: ${SECURITY_JWT_REFRESH_TTL:30d}

# Flujo OAuth de cuentas sociales (Track C / OAuthProperties prefix=oauth).
oauth:
  # Firma HMAC del state de un solo uso (base64, >=32 bytes). PROD: OAUTH_STATE_SECRET.
  state-secret: ${OAUTH_STATE_SECRET:RmXiLVwyWORp/QGW1EIskYiVE3++6aRjJu7r90wHsE8=}
  state-ttl-seconds: ${OAUTH_STATE_TTL_SECONDS:600}
  front-redirect-url: ${OAUTH_FRONT_REDIRECT_URL:http://localhost:5173/oauth/result}
  redirect-base-uri: ${OAUTH_REDIRECT_BASE_URI:http://localhost:8080}
  # Credenciales de apps — vacías hasta registrar las apps reales (dev usa el mock provider).
  meta:
    app-id: ${META_APP_ID:}
    app-secret: ${META_APP_SECRET:}
  tiktok:
    client-key: ${TIKTOK_CLIENT_KEY:}
    client-secret: ${TIKTOK_CLIENT_SECRET:}

# CORS para la SPA del front (Vite :5173, CRA :3000). Lista separada por comas;
# override por env CORS_ALLOWED_ORIGINS. Se aplica a /api/v1/** (ver SecurityConfig).
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Almacenamiento de objetos S3-compatible (Track E).
# Defaults = MinIO local; en PROD se sobreescriben por env hacia Cloudflare R2.
storage:
  backend: ${STORAGE_BACKEND:s3}          # s3 | local
  bucket: ${STORAGE_BUCKET:filgrama-media}
  s3:
    endpoint: ${STORAGE_S3_ENDPOINT:http://localhost:9000}
    region: ${STORAGE_S3_REGION:us-east-1}            # R2 ignora la región; MinIO también
    access-key: ${STORAGE_S3_ACCESS_KEY:filgrama}
    secret-key: ${STORAGE_S3_SECRET_KEY:filgrama123}
    path-style-access: ${STORAGE_S3_PATH_STYLE:true}  # true para MinIO; R2 también lo acepta
  local:
    base-dir: ${STORAGE_LOCAL_DIR:./var/media}        # fallback offline (backend=local)

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: ${SERVER_PORT:8080}

# Perfil local: logging más verboso
---
spring:
  config:
    activate:
      on-profile: local
logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
