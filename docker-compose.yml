services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${DB_NAME:-filgrama}
      POSTGRES_USER: ${DB_USER:-filgrama}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-filgrama}
    ports:
      - "5432:5432"
    volumes:
      - filgrama_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-filgrama} -d ${DB_NAME:-filgrama}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-filgrama}
      DB_USER: ${DB_USER:-filgrama}
      DB_PASSWORD: ${DB_PASSWORD:-filgrama}
      SPRING_PROFILES_ACTIVE: local
    ports:
      - "8080:8080"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-filgrama}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-filgrama123}
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # consola web (http://localhost:9001)
    volumes:
      - filgrama_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Crea el bucket una vez al levantar (idempotente) y termina.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-filgrama} ${MINIO_ROOT_PASSWORD:-filgrama123} &&
      mc mb --ignore-existing local/${STORAGE_BUCKET:-filgrama-media} &&
      echo 'bucket listo';
      "

volumes:
  filgrama_pgdata:
  filgrama_minio:
