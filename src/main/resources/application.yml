spring:
  application:
    name: filgrama-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/filgrama}
    username: ${DB_USER:filgrama}
    password: ${DB_PASSWORD:filgrama}

  jpa:
    hibernate:
      ddl-auto: validate      # el esquema lo maneja Flyway, no Hibernate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: ${SERVER_PORT:8080}

# Perfil local: logging más verboso
---
spring:
  config:
    activate:
      on-profile: local
logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
